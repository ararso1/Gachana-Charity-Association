{% if blog.is_video_post %}
  {% if blog.has_banner_image %}
  <div class="{{ css_class|default:'blog-image1' }} blog-card-media blog-card-media--cover">
    <img src="{{ blog.banner.url }}" alt="{{ blog.title }} cover" class="blog-card-media__cover-img">
    <span class="blog-card-media__play" aria-hidden="true"><i class="fa fa-play-circle"></i></span>
  </div>
  {% else %}
  <div class="{{ css_class|default:'blog-image1' }} blog-card-media blog-card-media--video">
    <i class="fa fa-play-circle" aria-hidden="true"></i>
    <span>Video</span>
  </div>
  {% endif %}
{% elif blog.has_banner_image %}
<img src="{{ blog.banner.url }}" alt="{{ blog.title }}" class="{{ css_class|default:'blog-image1' }}">
{% else %}
<div class="{{ css_class|default:'blog-image1' }} blog-card-media blog-card-media--empty">
  <i class="fa fa-newspaper-o" aria-hidden="true"></i>
</div>
{% endif %}
